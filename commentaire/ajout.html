<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouvelle Proposition - Commentaires</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #667eea;
      outline: none;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #5568d3;
    }
    .btn-retour {
      display: inline-block;
      padding: 10px 20px;
      background: #666;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .btn-retour:hover {
      background: #555;
    }
    .message {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    .message-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .container {
        padding: 20px;
        border-radius: 12px;
      }
      h1 { font-size: 1.3rem; }
      .form-group { margin-bottom: 15px; }
      label { font-size: 0.95rem; }
      input, select, textarea {
        padding: 10px;
        font-size: 15px;
      }
      textarea { min-height: 120px; }
      .btn { width: 100%; margin-bottom: 10px; }
      .btn-group { display: flex; flex-direction: column; gap: 10px; }
    }

    @media (max-width: 480px) {
      .container { padding: 15px; }
      h1 { font-size: 1.1rem; margin-bottom: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="btn-retour">
      <i class="fas fa-arrow-left"></i> Retour
    </a>
    
    <h1><i class="fas fa-comment-dots"></i> Nouvelle Proposition</h1>
    
    <div id="message-container"></div>
    
    <form id="form-commentaire">
      <div class="form-group">
        <label for="nom"><i class="fas fa-user"></i> Votre nom</label>
        <input type="text" id="nom" name="nom" required placeholder="Entrez votre nom">
      </div>
      
      <div class="form-group">
        <label for="situation"><i class="fas fa-briefcase"></i> Votre situation</label>
        <select id="situation" name="situation" required onchange="toggleAutreChamp()">
          <option value="">Sélectionnez...</option>
          <option value="Médecin">Médecin</option>
          <option value="Médecin Spécialiste">Médecin Spécialiste</option>
          <option value="Sage-femme">Sage-femme</option>
          <option value="Infirmier">Infirmier/Infirmière</option>
          <option value="Étudiant">Étudiant</option>
          <option value="Autre">Autre</option>
        </select>
        <input type="text" id="situation-autre" name="situation-autre" placeholder="Précisez votre situation..." style="display:none; margin-top: 10px;">
      </div>
      
      <div class="form-group">
        <label for="message"><i class="fas fa-envelope"></i> Votre proposition ou commentaire</label>
        <textarea id="message" name="message" required placeholder="Décrivez votre proposition, suggestion ou commentaire..."></textarea>
      </div>
      
      <button type="submit" class="btn">
        <i class="fas fa-paper-plane"></i> Envoyer
      </button>
    </form>
  </div>
  
  <script>
    function toggleAutreChamp() {
      const situation = document.getElementById('situation').value;
      const autreChamp = document.getElementById('situation-autre');
      if (situation === 'Autre') {
        autreChamp.style.display = 'block';
        autreChamp.required = true;
      } else {
        autreChamp.style.display = 'none';
        autreChamp.required = false;
        autreChamp.value = '';
      }
    }
    
    document.getElementById('form-commentaire').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nom = document.getElementById('nom').value.trim();
      let situation = document.getElementById('situation').value;
      const situationAutre = document.getElementById('situation-autre').value.trim();
      const message = document.getElementById('message').value.trim();
      
      // Si "Autre" est sélectionné, utiliser le texte tapé par l'utilisateur
      if (situation === 'Autre' && situationAutre) {
        situation = situationAutre;
      }
      
      if (!nom || !situation || !message) {
        alert('Veuillez remplir tous les champs');
        return;
      }
      
      try {
        const response = await fetch('/api/commentaires', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'add',
            nom: nom,
            situation: situation,
            message: message
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          document.getElementById('message-container').innerHTML = `
            <div class="message message-success">
              <i class="fas fa-check-circle"></i> Votre proposition a été envoyée!<br>
              <strong>${result.info}</strong>
            </div>
          `;
          document.getElementById('form-commentaire').reset();
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 3000);
        } else {
          document.getElementById('message-container').innerHTML = `
            <div class="message message-error">
              <i class="fas fa-exclamation-circle"></i> Erreur: ${result.message}
            </div>
          `;
        }
      } catch (error) {
        document.getElementById('message-container').innerHTML = `
          <div class="message message-error">
            <i class="fas fa-exclamation-circle"></i> Erreur de connexion
          </div>
        `;
      }
    });
  </script>
</body>
</html>
