<!DOCTYPE html>
<html lang="fr">
<head>

    <style>
        :root { --primary-color: #f39c12; }

        h1 { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; }
        h2 { color: #c0392b; margin-top: 25px; border-left: 4px solid #c0392b; padding-left: 10px; }
        .back-btn { display: inline-block; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
        ul { line-height: 1.8; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Retour</a>
        <h1><i class="fas fa-hospital"></i> Suite de couche</h1>
        <ul>
            <li><strong>Cefacet</strong> cp 1g 1cp 3/j pdt 10j</li>
            <li><strong>Cerazette</strong> cp 75mg 1cp/j a partir de 21eme j du pp pdt 3mois</li>
            <li><strong>Tardyferon</strong> 1cp/j Ou <strong>Fumafer</strong> 2cp/j</li>
            <li><strong>Lovenox</strong> 0.4 inj 1inj/j en Sc a heure fixe</li>
            <li><strong>Saforelle</strong> sol 1app 3/j</li>
        </ul>
    </div>
