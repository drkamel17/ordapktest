<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Médecine Interne - Dr KHERBA N</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #16a085 0%, #1abc9c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .header h2 {
            font-size: 1.3em;
            font-weight: 400;
            opacity: 0.95;
        }
        .content {
            padding: 40px 30px;
        }
        .section-title {
            color: #16a085;
            font-size: 1.8em;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #16a085;
        }
        .condition-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .condition-btn {
            display: block;
            width: 100%;
            padding: 20px 25px;
            background: white;
            border: 3px solid #16a085;
            color: #16a085;
            font-size: 1.3em;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-align: left;
        }
        .condition-btn:hover {
            background: #16a085;
            color: white;
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(22, 160, 133, 0.4);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #555;
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            .content {
                padding: 25px 20px;
            }
            .condition-btn {
                font-size: 1.1em;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Médecine Interne</h1>
            <h2>Dr KHERBA N</h2>
        </div>
        <div class="content">
            <h3 class="section-title">Conditions</h3>
            <div class="condition-list">
                <a href="behcet.html" class="condition-btn">Maladie de Behçet</a>
                <a href="cellulite.html" class="condition-btn">Cellulite</a>
                <a href="engelures.html" class="condition-btn">Engelures</a>
                <a href="erysipele.html" class="condition-btn">Érysipèle</a>
                <a href="pied-diabetique.html" class="condition-btn">Pied diabétique</a>
                <a href="purpura-rhumatoide.html" class="condition-btn">Purpura rhumatoïde</a>
                <a href="secheresse-buccale.html" class="condition-btn">Sécheresse buccale</a>
            </div>
        </div>
    </div>
</body>
</html>
