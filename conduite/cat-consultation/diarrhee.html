<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>DIARRHEE - CAT</title><style>body{font-family:"Segoe UI";background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}.container{max-width:900px;margin:0 auto}.header{background:#8e44ad;color:white;padding:25px;border-radius:15px;margin-bottom:25px}.content{background:white;padding:25px;border-radius:15px}.treatment{background:#f8f0f8;padding:15px;border-radius:10px;margin:15px 0;border-left:4px solid #8e44ad}h3{color:#8e44ad}ul{margin-left:20px}a{color:white}</style></head><body><div class="container"><div class="header"><a href="index.html" style="color:white;">← Retour</a><h1>DIARRHEE DE LADULTE</h1></div><div class="content"><div class="treatment"><h3>1. BACTRIM</h3><ul><li>1 cp x 2/j max 3/j</li><li>Ou 2 cp x 2/j max 6/j</li></ul></div><div class="treatment"><h3>2. IMODIUM</h3><ul><li>2mg : 2 gélules puis 1 gélule après chaque selle</li><li>Max 8/j pour adulte, 6/j enfant > 8ans</li></ul></div><div class="treatment"><h3>3. SPASFON Lyoc</h3><ul><li>1 cp x 3/j si crise - max 6/j</li></ul></div><div class="treatment"><h3>4. SMECTA</h3><ul><li>1 sachet x 3/j</li></ul></div></div></div></body></html>
